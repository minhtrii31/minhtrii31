<svg width="1600" height="600" viewBox="0 0 1600 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hi, I'm Tri</title>
  <desc id="desc">A calm dark banner for Nguyen Huynh Minh Tri, a fullstack website developer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#090909"/>
      <stop offset="0.58" stop-color="#111111"/>
      <stop offset="1" stop-color="#171717"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1080 135) rotate(140) scale(620 310)">
      <stop stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" stroke="#FFFFFF" stroke-opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="1600" height="600" fill="url(#bg)"/>
  <rect width="1600" height="600" fill="url(#glow)"/>
  <rect x="72" y="58" width="1456" height="484" fill="url(#grid)" opacity="0.72"/>
  <rect x="72.5" y="58.5" width="1455" height="483" stroke="#FFFFFF" stroke-opacity="0.11"/>

  <path d="M112 182H1488" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <path d="M112 424H1488" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <path d="M112 458C314 356 489 337 663 393C863 457 1037 409 1232 256C1329 180 1402 144 1488 128" stroke="#FFFFFF" stroke-opacity="0.13" stroke-width="1.2"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
